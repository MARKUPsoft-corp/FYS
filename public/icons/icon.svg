<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle — maskable safe zone fills 80% of canvas -->
  <circle cx="256" cy="256" r="256" fill="#3F6D4E"/>

  <!-- Leaf shape — simplified natural leaf -->
  <path
    d="M256 120
       C256 120 160 160 140 260
       C128 320 160 380 200 400
       C220 408 240 400 256 388
       C272 400 292 408 312 400
       C352 380 384 320 372 260
       C352 160 256 120 256 120Z"
    fill="white"
    fill-opacity="0.95"
  />
  <!-- Leaf center vein -->
  <line x1="256" y1="140" x2="256" y2="395" stroke="#3F6D4E" stroke-width="6" stroke-linecap="round"/>
  <!-- Side veins -->
  <line x1="256" y1="200" x2="210" y2="240" stroke="#3F6D4E" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="240" x2="205" y2="280" stroke="#3F6D4E" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="280" x2="215" y2="320" stroke="#3F6D4E" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="200" x2="302" y2="240" stroke="#3F6D4E" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="240" x2="307" y2="280" stroke="#3F6D4E" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="256" y1="280" x2="297" y2="320" stroke="#3F6D4E" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- "FYS" wordmark at the bottom -->
  <text
    x="256" y="470"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="bold"
    letter-spacing="8"
    fill="white"
    fill-opacity="0.9"
  >FYS</text>
</svg>
